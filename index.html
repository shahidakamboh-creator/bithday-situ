<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you 💌</title>

<style>
body{
  margin:0;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #ffe4ec, #fff0f5, #ffeef8);
  overflow:hidden;
}

/* soft scrapbook background texture */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-image: radial-gradient(#fff 20%, transparent 20%),
  radial-gradient(#fff 20%, transparent 20%);
  background-position: 0 0, 10px 10px;
  background-size: 20px 20px;
  opacity:0.2;
  z-index:-1;
}

/* main card */
.card{
  width:320px;
  margin:120px auto;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border-radius:25px;
  padding:25px;
  text-align:center;
  box-shadow:0 10px 40px rgba(255,182,193,0.4);
  border:1px solid rgba(255,255,255,0.4);
}

/* polaroid style mini decoration */
.polaroid{
  width:120px;
  padding:10px;
  background:white;
  margin:10px auto;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transform: rotate(-3deg);
  border-radius:5px;
}

/* buttons */
button{
  padding:12px 20px;
  border:none;
  border-radius:30px;
  margin:8px;
  cursor:pointer;
  font-family:Georgia;
  transition:0.3s;
}

.yes{
  background:#ffb6c1;
}

.no{
  background:#ffd6e7;
}

button:hover{
  transform:scale(1.05);
}

/* pages */
.hidden{display:none;}

h1{
  color:#b30059;
  font-size:24px;
}

p{
  color:#8a2c55;
}

/* ribbon top */
.ribbon{
  width:100%;
  text-align:center;
  font-size:14px;
  color:#c2185b;
  padding-top:15px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- PAGE 1 -->
<div id="page1" class="card">
  <div class="ribbon">⋆˚࿔ for someone special 𝜗𝜚˚⋆</div>

  <div class="polaroid">💗</div>

  <h1>do you want to open this?</h1>

  <button class="yes" onclick="openPage()">yes</button>
  <button class="no" onclick="openPage()">yes</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="card hidden">
  <div class="ribbon">⋆˚࿔ message for you 𝜗𝜚˚⋆</div>

  <h1>💌</h1>

  <p>
    happy birthday / i love you / i miss you<br>
    you are very special to me ♡
  </p>

  <h3>🎧 voice message</h3>
  <audio controls>
    <source src="voice.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function openPage(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}
</script>

</body>
</html>
